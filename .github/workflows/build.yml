name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

permissions:
  contents: write   # release creation needs this

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: System libs (Qt offscreen plugin)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install rosu-pp-py PySide6 pytest pytest-qt

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ test_redpp.py -v

  build-linux:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: System libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            libfuse2

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install rosu-pp-py PySide6 pyinstaller

      - name: PyInstaller bundle
        run: |
          pyinstaller --noconfirm --onefile --windowed --name redpp \
            --paths . \
            --add-data "redpp_app/theme.qss:redpp_app" \
            --add-data "redpp_app/assets:redpp_app/assets" \
            --hidden-import=PySide6 \
            --hidden-import=rosu_pp_py \
            --hidden-import=redpp \
            _launch.py

      - name: Build AppImage
        run: |
          set -e
          mkdir -p AppDir/usr/bin
          cp dist/redpp AppDir/usr/bin/redpp
          chmod +x AppDir/usr/bin/redpp

          cat > AppDir/redpp.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=RedPP
          Comment=osu!(lazer) pp calculator
          Exec=redpp
          Icon=redpp
          Type=Application
          Categories=Game;Utility;
          Terminal=false
          DESKTOP

          cp redpp_app/assets/s_rank.svg AppDir/redpp.svg

          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/redpp" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          wget -qO appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage AppDir RedPP-x86_64.AppImage

      - name: Rename raw binary
        run: mv dist/redpp redpp-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: RedPP-linux
          path: |
            redpp-linux-x86_64
            RedPP-x86_64.AppImage
          if-no-files-found: error

  build-windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install rosu-pp-py PySide6 pyinstaller

      - name: PyInstaller bundle
        run: |
          pyinstaller --noconfirm --onefile --windowed --name redpp `
            --paths . `
            --add-data "redpp_app/theme.qss;redpp_app" `
            --add-data "redpp_app/assets;redpp_app/assets" `
            --hidden-import=PySide6 `
            --hidden-import=rosu_pp_py `
            --hidden-import=redpp `
            _launch.py

      - name: Rename binary
        run: Move-Item dist/redpp.exe RedPP-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: RedPP-windows
          path: RedPP-windows-x86_64.exe
          if-no-files-found: error

  build-extension:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Chrome + Firefox zips
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq zip
          chmod +x redpp_ext/build_ext.sh
          ./redpp_ext/build_ext.sh

      - uses: actions/upload-artifact@v4
        with:
          name: RedPP-extension
          path: dist-ext/*.zip
          if-no-files-found: error

  release:
    needs: [build-linux, build-windows, build-extension]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -lhR artifacts

      - name: Flatten extension zips
        run: |
          mkdir -p release-files
          cp artifacts/RedPP-linux/redpp-linux-x86_64    release-files/
          cp artifacts/RedPP-linux/RedPP-x86_64.AppImage release-files/
          cp artifacts/RedPP-windows/RedPP-windows-x86_64.exe release-files/
          cp artifacts/RedPP-extension/*.zip release-files/
          ls -lh release-files/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
